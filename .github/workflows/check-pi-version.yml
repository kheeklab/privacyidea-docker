name: Sync PI Tags

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Allows manually triggering

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create and push tags
      actions: write  # Needed to trigger workflow dispatches

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PI tags
        id: get-pi-tags
        run: |
          echo "Fetching PI release tags from GitHub API (first page, excluding pre-releases)..."
          PI_TAGS=$(curl -fsSL -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/privacyidea/privacyidea/releases" \
            | jq -r '.[] | select(.prerelease == false) | .tag_name' 2>/dev/null || true)
          # Convert newlines to spaces
          PI_TAGS_FORMATTED=$(echo "$PI_TAGS" | tr '\n' ' ')
          echo "pi_tags=$PI_TAGS_FORMATTED" >> $GITHUB_ENV

      - name: Get PI versions on PyPI
        id: get-pi-pypi-versions
        run: |
          echo "Fetching privacyIDEA release versions from PyPI..."
          PYPI_VERSIONS=$(curl -fsSL "https://pypi.org/pypi/privacyIDEA/json" \
            | jq -r '.releases | keys[]' 2>/dev/null || true)
          PYPI_VERSIONS_FORMATTED=$(echo "$PYPI_VERSIONS" | tr '\n' ' ')
          echo "pypi_versions=$PYPI_VERSIONS_FORMATTED" >> $GITHUB_ENV

      - name: Get existing tags
        id: get-existing-tags
        run: |
          git fetch --tags
          EXISTING_TAGS=$(git tag -l)
          # Convert newlines to spaces
          EXISTING_TAGS_FORMATTED=$(echo "$EXISTING_TAGS" | tr '\n' ' ')
          echo "existing_tags=$EXISTING_TAGS_FORMATTED" >> $GITHUB_ENV

      - name: Process missing tags
        id: process_tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Convert existing tags to a pattern for quick matching
          EXISTING_TAGS_PATTERN=" ${{ env.existing_tags }} "
          # Convert PyPI versions to a pattern for quick matching
          PYPI_VERSIONS_PATTERN=" ${{ env.pypi_versions }} "

          # Collect tags to create
          TAGS_TO_CREATE=()
          SKIPPED_EXISTING=0
          SKIPPED_NOT_ON_PYPI=0

          # Process each PI tag
          for tag in ${{ env.pi_tags }}; do
            # Only process version tags starting with 'v'
            if [[ ! "$tag" =~ ^v ]]; then
              continue
            fi

            # Check if tag exists
            if [[ "$EXISTING_TAGS_PATTERN" == *" $tag "* ]]; then
              ((SKIPPED_EXISTING++)) || true
              continue
            fi

            # Only trigger when this version is available on PyPI
            pypi_version="${tag#v}"
            if [[ "$PYPI_VERSIONS_PATTERN" != *" $pypi_version "* ]]; then
              ((SKIPPED_NOT_ON_PYPI++)) || true
              continue
            fi

            TAGS_TO_CREATE+=("$tag")
          done

          # Create all tags locally first
          for tag in "${TAGS_TO_CREATE[@]}"; do
            git tag "$tag"
          done

          # Push all tags at once - this triggers release.yml via push: tags: 'v*'
          # But for reliability, also explicitly trigger the release workflow
          if [[ ${#TAGS_TO_CREATE[@]} -gt 0 ]]; then
            echo "Pushing ${#TAGS_TO_CREATE[@]} tags..."
            git push origin "${TAGS_TO_CREATE[@]}"

            # Explicitly trigger release.yml for each new tag
            for tag in "${TAGS_TO_CREATE[@]}"; do
              echo "Triggering release.yml for ${tag}..."
              # Strip 'v' prefix since workflow_dispatch expects the version without 'v'
              version_without_v="${tag#v}"
              gh workflow run release.yml -f pi_version="${version_without_v}" --repo "$GITHUB_REPOSITORY" || true
            done
          fi

          # Write results to GITHUB_OUTPUT for the summary step
          # Build JSON array by constructing it directly
          if [[ ${#TAGS_TO_CREATE[@]} -gt 0 ]]; then
            JSON_PART=$(printf ', "%s"' "${TAGS_TO_CREATE[@]}")
            TAGS_JSON="[${JSON_PART:1}]"
          else
            TAGS_JSON='[]'
          fi
          echo "tags_created_json=${TAGS_JSON}" >> $GITHUB_OUTPUT
          echo "created_count=${#TAGS_TO_CREATE[@]}" >> $GITHUB_OUTPUT
          echo "skipped_existing=$SKIPPED_EXISTING" >> $GITHUB_OUTPUT
          echo "skipped_not_on_pypi=$SKIPPED_NOT_ON_PYPI" >> $GITHUB_OUTPUT

      - name: Summary
        if: always()
        run: |
          echo "## PI Tag Sync Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CREATED_COUNT=${{ steps.process_tags.outputs.created_count }}
          SKIPPED_EXISTING=${{ steps.process_tags.outputs.skipped_existing }}
          SKIPPED_NOT_ON_PYPI=${{ steps.process_tags.outputs.skipped_not_on_pypi }}
          TAGS_CREATED_JSON="${{ steps.process_tags.outputs.tags_created_json }}"

          if [[ "$CREATED_COUNT" -gt 0 ]]; then
            echo "### 🎉 New Tags Created" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$TAGS_CREATED_JSON" | jq -r '.[]' | while read -r tag; do
              echo "  • $tag → [Build workflow](https://github.com/${{ github.repository }}/actions?query=workflow%3Arelease+tag%3A$tag)" >> $GITHUB_STEP_SUMMARY
            done
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Triggered \`release.yml\` builds for $CREATED_COUNT new tag(s)." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ No New Tags" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All available privacyIDEA versions already have corresponding tags." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Tags created | $CREATED_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️  Skipped (already exist) | $SKIPPED_EXISTING |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏸️  Skipped (not on PyPI) | $SKIPPED_NOT_ON_PYPI |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Last synced: \`$(date -u +"%Y-%m-%d %H:%M:%S UTC")\`" >> $GITHUB_STEP_SUMMARY
